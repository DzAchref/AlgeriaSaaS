version: '3.9'

services:
  # ============================================
  # PostgreSQL 16 — Primary Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: algeria_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: algeria_saas
      POSTGRES_USER: algeria_saas_user
      POSTGRES_PASSWORD: changeme_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algeria_saas_user -d algeria_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis — Caching, Sessions, Idempotency Keys
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: algeria_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # pgAdmin — Database Management UI
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: algeria_saas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@algeriasaas.dz
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
